# MANIFEST — mapping canônico de regras para globs de path
#
# O reviewer (Beethoven) lê este arquivo e, para cada entry, verifica se
# algum path tocado pelo PR casa com os globs em `when`. Se casa, o arquivo
# em `file` é incluído no contexto do review.
#
# Valores especiais:
#   when: always   → sempre incluído
#
# Os globs seguem sintaxe padrão (fnmatch / PurePath.match):
#   **/*.py              → qualquer arquivo .py em qualquer profundidade
#   apps/*-ds/**         → qualquer coisa sob apps com sufixo -ds
#
# Novos arquivos de regra devem ser adicionados aqui E criados em rules/.

rules:
  - file: pr-level.md
    when: always

  - file: python.md
    when:
      - "**/*.py"

  - file: frontend.md
    when:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"

  - file: design-system.md
    when:
      - "apps/*-ds/**"
      - "services/*-ds/**"
      - "packages/*-ds/**"

  - file: testing.md
    when:
      - "**/tests/**"
      - "**/test_*.py"
      - "**/*_test.py"
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "**/*.spec.ts"
      - "**/*.spec.tsx"
      - "**/*.component.test.tsx"
      - "**/*.unit.test.ts"

  # ─────────────────────────────────────────────────────────────────────────────
  # Principles-based rules (linguagem-agnósticas).
  #
  # Estas entries ativam regras universais escritas em rules/principles/. As
  # mesmas regras se aplicam a backend Python e frontend TS — só os exemplos
  # de código em cada arquivo é que diferem por linguagem.
  #
  # IMPORTANTE: ativação cadenciada — adicionar entries gradualmente, uma
  # categoria por semana, das mais inquestionáveis (secrets, security) para
  # as mais semânticas (data-access, complexidade). Preservar precisão alta
  # do reviewer nas primeiras semanas é o que sustenta credibilidade
  # institucional.
  #
  # Rollout: descomentar UMA entry por vez, observar ~1 semana antes da próxima.
  # Semana 1 (ativa abaixo): secrets-and-injection.
  # Semanas seguintes (ainda comentadas): error-handling, runtime-correctness,
  # code-complexity, algorithmic-complexity, data-access-and-batching.
  # ─────────────────────────────────────────────────────────────────────────────

  - file: principles/secrets-and-injection.md
    when:
      - "**/*.py"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"

